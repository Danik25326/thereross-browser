name: TRS Build — Linux

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build TRS (Linux x64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout trs-core
        uses: actions/checkout@v4
        with:
          path: trs-core

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: ~/.depot_tools
          key: depot-tools-${{ runner.os }}

      - name: Cache Chromium src
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-124-${{ runner.os }}-${{ hashFiles('trs-core/scripts/setup.sh') }}
          restore-keys: chromium-124-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential clang ninja-build lld \
            pkg-config libgtk-3-dev libnss3-dev libdrm-dev libxkbcommon-dev

      - name: Setup environment
        run: |
          cd trs-core
          ./scripts/setup.sh --skip-sync

      - name: Build TRS (debug)
        run: |
          cd trs-core
          ./scripts/build.sh debug --jobs 4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trs-linux-debug-${{ github.sha }}
          path: chromium/src/out/TRS_Debug/chrome
          retention-days: 7
